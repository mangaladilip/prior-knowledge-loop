<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Quiz: Logic & Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-green: #77a766;
            --accent-yellow: #e8d227;
            --bg-white: #f9f9fa;
            --card-off-white: #f2f1e8;
            --text-dark: #232323;
        }

        /* FULL PAGE LIVE BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #77a766, #8dbd7e, #f2f1e8, #77a766);
            background-size: 400% 400%;
            animation: liveGradient 12s ease infinite;
        }

        @keyframes liveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* INCREASED CONTAINER SIZE */
        .quiz-container { 
            width: 90%; 
            max-width: 850px; /* Much larger width for classroom visibility */
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(242, 241, 232, 0.95); /* Semi-transparent to blend with bg */
            padding: 50px; /* Increased padding for breathing room */
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
            transition: all 0.5s ease;
        }

        #q1 { display: block; } /* Ensure first question is visible */

        h2 { 
            font-size: 1.8rem; /* Larger font for larger container */
            color: var(--text-dark);
            margin-bottom: 30px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns for the large container */
            gap: 20px;
            margin: 30px 0;
        }

        .option {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
            font-size: 1.1rem;
            text-align: center;
        }

        .option:hover { border-color: var(--accent-yellow); transform: translateY(-3px); }
        .selected { border-color: var(--primary-green) !important; background: #fff !important; font-weight: 600; }

        .next-btn {
            width: 100%;
            padding: 20px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Outfit';
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            margin-top: 20px;
        }

        /* FEEDBACK MODAL */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(35, 35, 35, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .logic-panel {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            border-left: 6px solid var(--primary-green);
            white-space: pre-wrap;
        }

        .close-btn {
            background: var(--primary-green);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="q1" class="card">
        <h2>Q1. Which of the following best describes a sequence of instructions followed step-by-step?</h2>
        <div class="options-grid">
            <div class="option" onclick="handleInput(this, true, 1)">Algorithm</div>
            <div class="option" onclick="handleInput(this, false, 1)">Variable</div>
            <div class="option" onclick="handleInput(this, false, 1)">Output</div>
            <div class="option" onclick="handleInput(this, false, 1)">Loop</div>
        </div>
        <button id="btn1" class="next-btn" onclick="nextCard(1, 2)">Continue to Question 2</button>
    </div>

    <div id="q2" class="card">
        <h2>Q2. What is the value of <b>i</b> after this code execution?</h2>
        <div style="background:var(--text-dark); color:white; padding:25px; border-radius:15px; font-family:monospace; font-size: 1.5rem; margin-bottom:20px; text-align: center;">
            i = 1<br>i = i + 1
        </div>
        <div class="options-grid">
            <div class="option" onclick="handleInput(this, false, 2)">1</div>
            <div class="option" onclick="handleInput(this, true, 2)">2</div>
            <div class="option" onclick="handleInput(this, false, 2)">3</div>
            <div class="option" onclick="handleInput(this, false, 2)">0</div>
        </div>
        <button id="btn2" class="next-btn" onclick="alert('Quiz Complete!')">Finish Quiz</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-top:0;"></h2>
        <div class="logic-panel" id="m-logic"></div>
        <button class="close-btn" onclick="document.getElementById('modal').style.display='none'">Got it!</button>
    </div>
</div>

<script>
    const explanations = {
        1: "FLOWCHART LOGIC:\n[START] -> [ACTION 1] -> [ACTION 2] -> [STOP]\n\nPSEUDOCODE:\n1. Initialize System\n2. Perform Sequence\n3. End",
        2: "FLOWCHART LOGIC:\n[i ← 1] -> [Calculate 1 + 1] -> [i ← 2]\n\nPSEUDOCODE:\nSET i TO 1\nINCREMENT i BY 1\nDISPLAY i"
    };

    function handleInput(el, isCorrect, q) {
        const options = el.parentElement.querySelectorAll('.option');
        options.forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');

        document.getElementById('btn' + q).style.display = 'block';

        if(isCorrect) {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            document.getElementById('m-title').innerText = "Correct!";
            document.getElementById('m-title').style.color = "#77a766";
        } else {
            document.getElementById('m-title').innerText = "Try Again!";
            document.getElementById('m-title').style.color = "#b83f5c";
        }
        document.getElementById('m-logic').innerText = explanations[q];
        document.getElementById('modal').style.display = 'flex';
    }

    function nextCard(curr, next) {
        document.getElementById('q' + curr).style.display = 'none';
        document.getElementById('q' + next).style.display = 'block';
    }
</script>

</body>
</html>
